{% load static %}
{% block xtra_css %}
<link href="{% static 'files/css/message_wrapper.css' %}?v=1" rel="stylesheet" type="text/css" /> 
<!--new message wrapper-->
<link href='https://fonts.googleapis.com/css?family=Roboto:300italic,400italic,400,100,300,600,700' rel='stylesheet' type='text/css'>
<!--new message wrapper-->
{% endblock %}
    {% if messages %}
	{% for message in messages %}
	{% if forloop.counter0 == 0 %}
    <div class="message_wrapper {{ message.tags }}" onclick="close_message();">
    <h2 style="font-weight: 100;font-size: 18pt;text-align:center;line-height: 2em;margin: 15px 0;color:#ffffff">{% autoescape off %}{{ message }}{% endautoescape %}</h2>
    </div>
	{% endif %}
	{% endfor %}
    {% endif %}
    <script>
    function close_message()
        {
		$('.message_wrapper').hide();
        }
	$(window).ready(function(){
         $('.message_wrapper').addClass('display_class');
         AutoCloseDialogBox(2000);
            return false;
     }); 
     function AutoCloseDialogBox(WaitSeconds) {
            //Auto Close Dialog Box after few seconds
            setTimeout(
                function () {
                    $(".message_wrapper").hide();
                }, WaitSeconds);
        }
    </script>
