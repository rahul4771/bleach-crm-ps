
<!-- 
    inv-noti-success -- success
    inv-noti-error -- error
    inv-noti-warning -- warning


-->


{% load static %}
{% block xtra_css %}
<link href="{% static 'files/css/message_wrapper.css' %}?v=1" rel="stylesheet" type="text/css" />
{% endblock %}

<!-- chnage notification class success, error,warning -->
<div class="inv-noti-container inv-noti-success">
    <div class="d-flex">
        <div class="inv-msg-div">Msg Here</div>
        <div onclick="closeNotification()" class="right-pos inv-pointer"><i class="fa fa-times" aria-hidden="true"></i>
        </div>
    </div>
</div>
<script>
    function close_message() {
        $('.message_wrapper').hide();
    }
    $(window).ready(function () {
        $('.message_wrapper').addClass('display_class');
        AutoCloseDialogBox(1600);
        return false;
    });
    function AutoCloseDialogBox(WaitSeconds) {
        //Auto Close Dialog Box after few seconds
        setTimeout(
            function () {
                $(".message_wrapper").hide();
            }, WaitSeconds);
    }
</script>
