    //Function Used For Cleaning Calender    
    function isArrayInArrayOverlap(source,search)
    {   count1=1;
        count2=1;


        for(var i=0,len=source.length;i<len;i++)
        {
            if(source[i][0]>=search[0] && source[i][0] >= search[1])
            {
                count1++;
            }
            if(source[i][1]<=search[0] && source[i][1] >= search[1])
            {
                count2++;
            }
        
        }
        if(count1==source.length || count2 == source.length)
        {
            return true;
            }
        else{
            return false;
        }    
        }
