    //Function Used For Cleaning Calender    
    function isArrayInArrayOverlap(source,search)
    {   count1=1;
        count2=1;


        for(var i=0,len=source.length;i<len;i++)
        {
            if(source[i][0]>=search[0] && source[i][0] >= search[1])
            {
                count1++;
            }
            if(source[i][1]<=search[0] && source[i][1] >= search[1])
            {
                count2++;
            }
        
        }
        if(count1==source.length || count2 == source.length)
        {
            return true;
            }
        else{
            return false;
        }    
        }

<script type="text/javascript">
$('.edit_evaluation').on('click', function (e) {
      e.preventDefault();
      $('.modal-popup-wrapper').toggleClass('is-visible');

      $('#blcno_evaluation_id').html($(this).data('blcno'));
      $('#address_evaluation_id').html($(this).data('street')+', '+$(this).data('apartment')+', '+$(this).data('block')+', '+$(this).data('avenue')+', '+$(this).data('building')+', '+$(this).data('area')+', '+$(this).data('governorate'));
      $('#proposed_date_evaluation_id').html($(this).data('proposed_date'));
      $('#proposed_time_evaluation_id').html($(this).data('proposed_time'));
      $('#customername_evaluation_id').html($(this).data('customer_name'));
      $('#mobileno_evaluation_id').html($(this).data('mobile_no'));
      $('#evaluator_name_evaluation_id').html($(this).data('evaluator_name'));

      //form values
      $('#evaluation_id').val($(this).data('id'));
      $('#appointment_date').val($(this).data('proposed_date'));
      $('#appointment_time').val($(this).data('proposed_time'));
      $('#notes').html($(this).data('notes'));

      customer_id         = $(this).data('customer_id'); 

  $.ajax({

        url: "{% url 'agent:ajax-getaddress' %}",

        data: {'customer_id':customer_id}, 

        dataType: 'json',

        success: function (data) { 

          ajax_ret_address = data['customer_address'];      

        $.each( ajax_ret_address, function( key, values ) {

              $("#address").append($('<option>', {        

                              value: key, 

                              text: values   

                            }));           

              });
                                  }  
      });

        $('#evaluator').val($(this).data('evaluator_id'));
        $('#address').val($(this).data('address_id'));

});

var coll = document.getElementsByClassName("collapsible");
var i;
for (i = 0; i < coll.length; i++) {
  coll[i].addEventListener("click", function() {
    this.classList.toggle("active");
    var content = this.nextElementSibling;
    if (content.style.display === "block") {
      content.style.display = "none";
    } else {
      content.style.display = "block";
    }
  });
  }
</script>
