{% load static %}
<!doctype html>
<html lang="en" xml:lang="en" >
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    
    
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  
    <meta name="viewport" content="width=device-width, initial-scale=1.0" id="viewportMeta" />

    
    <meta name="description" content="Bleach Voucher">
    <meta name="author" content="Voucher">

    

   

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css" integrity="sha512-HK5fgLBL+xu6dm/Ii3z4xhlSUyZgTT9tuc/hSrtw6uzJOvgRr2a9jyxxT1ely+B+xFAmJKVSTbpM/CuL7qxO8w==" crossorigin="anonymous" />
    <link rel="stylesheet" href="{% static 'files/externalfiles/css/main.css' %}">
    <title>Bleach Cleaning Services | Booking</title>

  </head>
  <body id="printableArea">
    <form method="post" action="">
      {%csrf_token%}
  <div class="container mt-4 bk-card h-100 mb-4">
      <div class="row pt-4">
          <div class="col-md-10 mx-auto">
             <div class="row">
                
    <h3 class="pt-4">Client Address</h3>
    <div class="row ">
        <div class="col-md-12 pt-4">
         
            <div class="form-group required">
                
                <label for="location" class="control-label">Location</label>
                <select class="form-select" id="location" name="location" required>
                    <option  value="" selected disabled>Choose Location</option>
                    {% for location in locations %}
                    <option value="{{location.name}}">{{location.name}}</option>
                    {% endfor %}
                </select>
            

          </div>

           
        </div>
        <div class="col-md-12 pt-4">
            <div class="form-group ">
                
                <label for="gps" class="control-label">GPS Location</label>
               
                    <textarea class="form-control" id="gps" rows="3" name="gps_location"></textarea>
                 
            

          </div>
          
        </div>
        
    </div>
    <div class="row ">
        <div class="col-md-6 pt-4">
            <div class="form-group required">
                
                <label for="gender" class="control-label">Gevernorate</label>
                <select class="form-select governorate" id="id_governorate" name="governorate" required>
                    <option  selected disabled>Choose Gevernorate</option>
                    {% for governorate in governorates %}
                    <option value="{{governorate.id}}">{{governorate.name}}</option>
                    {% endfor %}
                  </select>
            

          </div>
          
        </div>
        <div class="col-md-6 pt-4">
            <div class="form-group required">
                
                <label for="gender" class="control-label">Area</label>
                <select class="form-select" id="id_area" name="area" required>
                    <option  selected disabled>Choose Area</option>
                  </select>
            

          </div>
          
        </div>
        
        
    </div>
    <div class="row ">
        <div class="col-md-6 pt-4">
         
              <div class="form-group required"><label class="control-label">Address Title</label><input class="form-control" id="address" placeholder="Address Title" type="text" name="apartment" required/></div>

           
        </div>
        <div class="col-md-6 pt-4">
          <div class="form-group ">
             <label for="name-arabic" class="control-label">Floor/Flat/House</label>
              <input type="text" class="form-control" placeholder="Floor/Flat/House" aria-label="phone" aria-describedby="basic-addon1" id="floor" name="floor">
            </div>
        </div>
        
    </div>
    <div class="row ">
        <div class="col-md-6 pt-4">
         
              <div class="form-group required"><label class="control-label">Building</label><input class="form-control" id="building" placeholder="Building" type="text" name="building" required/></div>

           
        </div>
        <div class="col-md-6 pt-4">
          <div class="form-group required">
             <label for="name-arabic" class="control-label">Block</label>
              <input type="text" class="form-control" placeholder="Block" aria-label="phone" aria-describedby="basic-addon1" id="block" name="block" required>
            </div>
        </div>
        
    </div>
    <div class="row mb-4">
        <div class="col-md-6 pt-4">
         
              <div class="form-group required"><label class="control-label">Street</label><input class="form-control" id="street" placeholder="Street" type="text" name="street" required/></div>

           
        </div>
        <div class="col-md-6 pt-4">
          <div class="form-group ">
             <label for="name-arabic" class="control-label">Avenue</label>
              <input type="text" class="form-control" placeholder="Avenue" aria-label="phone" aria-describedby="basic-addon1" id="avenue" name="avenue">
            </div>
        </div>
        
    </div>
    
 
    </div>
</div>
    
<div class="row mt-4 mb-4">
    <div class="col-md-1 mx-auto mt-4">
        <input type="submit"  class="btn btn-primary" value="Next">
    </div>
</div>
  </div>
</form>
      
   

   
   <script src="https://code.jquery.com/jquery-3.5.1.js" integrity="sha256-QWo7LDvxbWT2tbbQ97B53yJnYU3WhH/C8ycbRAkjPDc=" crossorigin="anonymous"></script>   
     <script src="{% static 'files/externalfiles/js/booking.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-select/1.12.2/js/bootstrap-select.min.js"></script>
<script>
$(document).ready(function(){

//Append area for governorate change
$(".governorate").change(function(){ 

  id=this.id.match(/\d+/); 

  $.ajax({

        url: "{% url 'agent:ajax-getarea' %}",

        data: {'governorate_id':this.value}, 

        dataType: 'json',

        success: function (data) { 

          ajax_ret_areas = data;     
          $("#id_area").empty();

        $("#id_area").append($('<option>', {
                      value: "", 
                      text: "Choose Area"
                    })); 

        $.each( ajax_ret_areas, function( key, values ) {

              $("#id_area").append($('<option>', {        
                      value: key,   
                      text: values   
                    }));   

        });


        }  

      }); 

});

});
</script>
  </body>
{% include 'common_messages.html' %}
</html>
